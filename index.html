<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta -->

    <link rel="canonical" href="https://netasia.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://netasia.dev/" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://netasia.dev/og-image.png" />

    <meta name="application-name" content="NetAsia" />
    <meta name="theme-color" content="#08080F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NetAsia",
      "url": "https://netasia.dev",
      "description": "Internet Intelligence Platform — professional network and web tools",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://netasia.dev/tools?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
