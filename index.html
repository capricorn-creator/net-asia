<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6256233151898165"
     crossorigin="anonymous"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>NetAsia — Internet Intelligence Platform</title>
    <meta name="description" content="Free professional network and web tools for developers, sysadmins, and security teams. IP Lookup, GeoIP, DNS, WHOIS, SSL Checker, HTTP Headers, Tech Detector and more — no signup required." />
    <meta name="keywords" content="IP lookup, DNS lookup, WHOIS, SSL checker, HTTP headers, GeoIP, reverse DNS, DNS propagation, website technology detector, URL redirect checker, network tools, internet tools" />
    <meta name="author" content="NetAsia" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://netasia.dev/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://netasia.dev/" />
    <meta property="og:title"       content="NetAsia — Internet Intelligence Platform" />
    <meta property="og:description" content="Free professional network and web tools. IP Lookup, GeoIP, DNS, WHOIS, SSL, HTTP Headers, Tech Detector and more — no signup required." />
    <meta property="og:image"       content="https://netasia.dev/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="NetAsia — Internet Intelligence Platform" />
    <meta property="og:site_name"   content="NetAsia" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NetAsia — Internet Intelligence Platform" />
    <meta name="twitter:description" content="Free professional network and web tools. IP Lookup, GeoIP, DNS, WHOIS, SSL, HTTP Headers and more — no signup required." />
    <meta name="twitter:image"       content="https://netasia.dev/og-image.png" />

    <!-- PWA -->
    <meta name="application-name"                  content="NetAsia" />
    <meta name="theme-color"                       content="#08080F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color"                       content="#F8FAFC" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"         content="NetAsia" />
    <meta name="mobile-web-app-capable"             content="yes" />

    <!-- Icons -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NetAsia",
      "url": "https://netasia.dev",
      "description": "Free professional network and web tools for developers, sysadmins, and security teams",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://netasia.dev/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NetAsia",
      "url": "https://netasia.dev",
      "logo": "https://netasia.dev/favicon.svg",
      "description": "Internet Intelligence Platform — free network and web tools",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://netasia.dev/contact"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
